    <title>Carta para Nataly</title>

  <body>
    <main class="app" aria-live="polite">
      <section class="intro" id="intro">
        <p class="kicker">Para</p>
        <h1>Nataly</h1>
        <p class="subtitle">Una carta especial te espera cuando cumplas 15 años y sean las 15:15 horas con 15 segundos.</p>

        <div class="stage" aria-label="Sobre cerrado con cuenta regresiva">
          <div class="sparkles" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>

          <div class="envelope" id="envelope" aria-hidden="true">
            <div class="envelope-back"></div>
            <div class="paper-peek">Para: Nataly<br />De: Anónimo</div>
            <div class="flap"></div>
            <div class="pocket-left"></div>
            <div class="pocket-right"></div>
            <div class="seal">15</div>
          </div>
        </div>

        <div class="countdown" id="countdown" aria-label="Cuenta regresiva">
          <div><strong id="days">00</strong><span>Días</span></div>
          <div><strong id="hours">00</strong><span>Horas</span></div>
          <div><strong id="minutes">00</strong><span>Min</span></div>
          <div><strong id="seconds">00</strong><span>Seg</span></div>
        </div>

        <p class="status" id="status">El sobre se podrá abrir el 15 de junio a las 15:15 horas con 15 segundos.</p>
        <button class="open-button" id="openButton" type="button" disabled>Abrir sobre</button>
      </section>
